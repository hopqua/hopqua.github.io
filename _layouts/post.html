---
layout: default
---

<article class="blog-post">
  <nav class="blog-breadcrumb" aria-label="Breadcrumb">
    <a href="{{ '/' | relative_url }}">Trang chủ</a>
    <span class="blog-breadcrumb-sep" aria-hidden="true">/</span>
    <a href="{{ '/blog/' | relative_url }}">Blog</a>
    <span class="blog-breadcrumb-sep" aria-hidden="true">/</span>
    <span>{{ page.title }}</span>
  </nav>
  <header class="blog-post-header">
    <h1 class="blog-post-title">{{ page.title }}</h1>
    <div class="blog-meta">
      <time datetime="{{ page.date | date: '%Y-%m-%d' }}">Ngày đăng: {{ page.date | date: "%d/%m/%Y" }}</time>
      {% if page.categories %}
      <span class="blog-meta-cats">
        {% for category in page.categories %}
        <span class="blog-card-tag">{{ category }}</span>
        {% endfor %}
      </span>
      {% endif %}
    </div>
  </header>

  <div class="blog-post-body">
    {{ content }}
  </div>

  <footer class="blog-post-footer">
    <a href="{{ '/blog/' | relative_url }}" class="blog-back-link">← Quay lại danh sách bài viết</a>
    <a href="{{ '/' | relative_url }}" class="blog-back-link blog-back-link-secondary">Xem sản phẩm</a>
  </footer>
</article>
